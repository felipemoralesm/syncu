<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncU — Inicia sesión</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#FF6B00" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/estilos.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FF6B00;
      --orange-dim: #cc5500;
      --bg: #0D0D0D;
      --surface: #141414;
      --surface2: #1c1c1c;
      --text: #FFFFFF;
      --muted: #888;
      --border: #2a2a2a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
    }

    /* ── Noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* ── Accent glow blob ── */
    .glow-blob {
      position: fixed;
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(255,107,0,0.18) 0%, transparent 70%);
      border-radius: 50%;
      top: -140px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none; z-index: 0;
      animation: pulsate 6s ease-in-out infinite;
    }
    @keyframes pulsate {
      0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; }
      50%       { transform: translateX(-50%) scale(1.12); opacity: .7; }
    }

    /* ── Speed lines decoration ── */
    .speed-lines {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: 220px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 38px,
        rgba(255,107,0,0.04) 38px,
        rgba(255,107,0,0.04) 39px
      );
      pointer-events: none; z-index: 0;
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 0 1px rgba(255,107,0,0.06), 0 32px 80px rgba(0,0,0,0.6);
      animation: slideUp .55s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo ── */
    .logo-wrap {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--orange);
      line-height: 1;
      display: inline-block;
    }
    .logo-bolt {
      display: inline-block;
      animation: bolt 2.4s ease-in-out infinite;
    }
    @keyframes bolt {
      0%, 90%, 100% { transform: rotate(0deg) scale(1); }
      95% { transform: rotate(-12deg) scale(1.15); }
    }

    .tagline {
      text-align: center;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2.4rem;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }
    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input::placeholder { color: #444; }
    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255,107,0,0.15);
    }

    /* ── CTA Button ── */
    .btn-primary {
      width: 100%;
      margin-top: 1.4rem;
      padding: 0.95rem;
      background: var(--orange);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .btn-primary:hover::after { transform: translateX(100%); }
    .btn-primary:hover {
      background: #ff7b1a;
      box-shadow: 0 0 28px rgba(255,107,0,0.5);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Footer link ── */
    .footer-link {
      text-align: center;
      margin-top: 1.6rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .footer-link a {
      color: var(--orange);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .footer-link a:hover { opacity: 0.8; }

    /* ── Status message ── */
    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    .status.error   { background: rgba(255,60,60,0.12); color: #ff6b6b; border: 1px solid rgba(255,60,60,0.2); display: block; }
    .status.success { background: rgba(0,220,130,0.1);  color: #00dc82; border: 1px solid rgba(0,220,130,0.2); display: block; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="glow-blob"></div>
  <div class="speed-lines"></div>

  <div class="page">
    <div class="card">

      <div class="logo-wrap">
        <div class="logo">SyncU <span class="logo-bolt">⚡</span></div>
      </div>
      <p class="tagline">Sincroniza tu horario · Conecta con tu gente</p>

      <div class="divider"><span>inicia sesión</span></div>

      <div class="form-group">
        <label for="email">Correo universitario</label>
        <input type="email" id="email" placeholder="correo@uniandes.edu.co" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Ingresar</button>

      <div class="status" id="statusMsg"></div>

      <p class="footer-link">¿No tienes cuenta? <a href="pages/registro.html">Regístrate</a></p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       Firebase CDN — reemplaza con tu config real
  ══════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDkAVe9p_toQ4CAveb7iaI0bvTsJc6gSpE",
      authDomain: "syncu-3abec.firebaseapp.com",
      projectId: "syncu-3abec",
      storageBucket: "syncu-3abec.firebasestorage.app",
      messagingSenderId: "287232013909",
      appId: "1:287232013909:web:d05003a489fa0190e806dc"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function showStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = `status ${type}`;
    }

    function setLoading(state) {
      const btn = document.getElementById('loginBtn');
      btn.disabled = state;
      btn.innerHTML = state
        ? '<span class="spinner"></span>Ingresando…'
        : 'Ingresar';
    }

    window.handleLogin = async function () {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showStatus('Por favor completa todos los campos.', 'error');
        return;
      }

      setLoading(true);

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showStatus('¡Bienvenido de vuelta!', 'success');
        setTimeout(() => window.location.href = 'pages/home.html', 800);
      } catch (err) {
        const msgs = {
          'auth/user-not-found':   'No encontramos una cuenta con ese correo.',
          'auth/wrong-password':   'Contraseña incorrecta. Inténtalo de nuevo.',
          'auth/invalid-email':    'El formato del correo no es válido.',
          'auth/too-many-requests':'Demasiados intentos. Espera un momento.',
        };
        showStatus(msgs[err.code] || `Error: ${err.message}`, 'error');
        setLoading(false);
      }
    };

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleLogin();
    });
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/syncu/sw.js')
        .catch(err => console.warn('SW:', err));
    }
  </script>
</body>
</html>
