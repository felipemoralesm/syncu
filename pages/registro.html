<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncU — Regístrate</title>
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#FF6B00" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/estilos.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FF6B00;
      --bg: #0D0D0D;
      --surface: #141414;
      --surface2: #1c1c1c;
      --text: #FFFFFF;
      --muted: #888;
      --border: #2a2a2a;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .glow-blob {
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,107,0,0.16) 0%, transparent 70%);
      border-radius: 50%;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none; z-index: 0;
      animation: pulsate 6s ease-in-out infinite;
    }
    @keyframes pulsate {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50%       { transform: translateX(-50%) scale(1.1); }
    }

    .speed-lines {
      position: fixed; left: 0; right: 0; bottom: 0; height: 200px;
      background: repeating-linear-gradient(
        90deg, transparent 0px, transparent 38px,
        rgba(255,107,0,0.04) 38px, rgba(255,107,0,0.04) 39px
      );
      pointer-events: none; z-index: 0;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 0 1px rgba(255,107,0,0.06), 0 32px 80px rgba(0,0,0,0.6);
      animation: slideUp .55s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap { text-align: center; margin-bottom: 0.4rem; }
    .logo {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--orange);
      line-height: 1;
    }
    .logo-bolt { display: inline-block; animation: bolt 2.4s ease-in-out infinite; }
    @keyframes bolt {
      0%, 90%, 100% { transform: rotate(0deg) scale(1); }
      95% { transform: rotate(-12deg) scale(1.15); }
    }

    .tagline {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--orange);
      margin: 1.6rem 0 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      appearance: none;
    }
    input::placeholder { color: #444; }
    input:focus, select:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255,107,0,0.15);
    }
    select option { background: #1c1c1c; color: #fff; }

    /* Field validation states */
    input.valid   { border-color: #00dc82; }
    input.invalid { border-color: #ff4d4d; }
    .field-hint {
      font-size: 0.72rem;
      margin-top: 0.3rem;
      display: none;
    }
    .field-hint.show { display: block; }
    .field-hint.ok  { color: #00dc82; }
    .field-hint.err { color: #ff6b6b; }

    /* Two columns */
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .btn-primary {
      width: 100%;
      margin-top: 1.6rem;
      padding: 0.95rem;
      background: var(--orange);
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .btn-primary:hover::after { transform: translateX(100%); }
    .btn-primary:hover {
      background: #ff7b1a;
      box-shadow: 0 0 28px rgba(255,107,0,0.5);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    .status.error   { background: rgba(255,60,60,0.12); color: #ff6b6b; border: 1px solid rgba(255,60,60,0.2); display: block; }
    .status.success { background: rgba(0,220,130,0.1);  color: #00dc82; border: 1px solid rgba(0,220,130,0.2); display: block; }

    .footer-link {
      text-align: center;
      margin-top: 1.6rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .footer-link a { color: var(--orange); text-decoration: none; font-weight: 600; }
    .footer-link a:hover { opacity: 0.8; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 1.5rem;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--orange);
      border-radius: 99px;
      width: 0%;
      transition: width 0.4s ease;
    }

    @media (max-width: 420px) {
      .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="glow-blob"></div>
  <div class="speed-lines"></div>

  <div class="page">
    <div class="card">

      <div class="logo-wrap">
        <div class="logo">SyncU <span class="logo-bolt">⚡</span></div>
      </div>
      <p class="tagline">Sincroniza tu horario · Conecta con tu gente</p>

      <!-- Progress indicator -->
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- ── Datos personales ── -->
      <div class="section-title">Datos personales</div>

      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="email">Correo universitario</label>
        <input type="email" id="email" placeholder="correo@uniandes.edu.co" autocomplete="email" />
        <div class="field-hint" id="emailHint"></div>
      </div>

      <!-- ── Perfil académico ── -->
      <div class="section-title">Perfil académico</div>

      <div class="form-group">
        <label for="carrera">Carrera</label>
        <select id="carrera">
          <option value="" disabled selected>Selecciona tu carrera</option>
          <optgroup label="Ingeniería">
            <option>Ingeniería de Sistemas y Computación</option>
            <option>Ingeniería Civil</option>
            <option>Ingeniería Industrial</option>
            <option>Ingeniería Eléctrica y Electrónica</option>
            <option>Ingeniería Mecánica</option>
            <option>Ingeniería Química</option>
            <option>Ingeniería Biomédica</option>
          </optgroup>
          <optgroup label="Ciencias">
            <option>Matemáticas</option>
            <option>Física</option>
            <option>Biología</option>
            <option>Química</option>
            <option>Estadística</option>
          </optgroup>
          <optgroup label="Ciencias Sociales y Humanidades">
            <option>Economía</option>
            <option>Derecho</option>
            <option>Psicología</option>
            <option>Historia</option>
            <option>Filosofía</option>
            <option>Sociología</option>
            <option>Antropología</option>
          </optgroup>
          <optgroup label="Artes y Humanidades">
            <option>Literatura</option>
            <option>Música</option>
            <option>Arte</option>
            <option>Diseño</option>
            <option>Arquitectura</option>
          </optgroup>
          <optgroup label="Administración">
            <option>Administración de Empresas</option>
            <option>Contaduría Pública</option>
            <option>Negocios Internacionales</option>
          </optgroup>
          <optgroup label="Medicina y Salud">
            <option>Medicina</option>
            <option>Enfermería</option>
            <option>Nutrición y Dietética</option>
          </optgroup>
          <option value="otro">Otra carrera</option>
        </select>
      </div>

      <div class="row-2">
        <div class="form-group">
          <label for="semestre">Semestre</label>
          <select id="semestre">
            <option value="" disabled selected>—</option>
            <option>1</option><option>2</option><option>3</option>
            <option>4</option><option>5</option><option>6</option>
            <option>7</option><option>8</option><option>9</option>
            <option>10</option><option>11</option><option>12</option>+
          </select>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
        </div>
      </div>

      <button class="btn-primary" id="registerBtn" onclick="handleRegister()">Crear cuenta</button>

      <div class="status" id="statusMsg"></div>

      <p class="footer-link">¿Ya tienes cuenta? <a href="../index.html">Inicia sesión</a></p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       Firebase CDN — reemplaza con tu config real
  ══════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp }               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDkAVe9p_toQ4CAveb7iaI0bvTsJc6gSpE",
      authDomain: "syncu-3abec.firebaseapp.com",
      projectId: "syncu-3abec",
      storageBucket: "syncu-3abec.firebasestorage.app",
      messagingSenderId: "287232013909",
      appId: "1:287232013909:web:d05003a489fa0190e806dc"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── Progress bar helpers ──
    const fields = ['nombre', 'email', 'carrera', 'semestre', 'password'];
    function updateProgress() {
      const filled = fields.filter(id => {
        const el = document.getElementById(id);
        return el && el.value.trim() !== '';
      }).length;
      document.getElementById('progressBar').style.width = `${(filled / fields.length) * 100}%`;
    }
    fields.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', updateProgress);
      if (el) el.addEventListener('change', updateProgress);
    });

    // ── Email validation hint ──
    const emailInput = document.getElementById('email');
    const emailHint  = document.getElementById('emailHint');
    emailInput.addEventListener('blur', () => {
      const val = emailInput.value.trim();
      if (!val) { emailHint.className = 'field-hint'; return; }
      if (val.endsWith('@uniandes.edu.co')) {
        emailHint.textContent = '✓ Correo Uniandino verificado';
        emailHint.className   = 'field-hint show ok';
        emailInput.classList.replace('invalid', 'valid');
      } else {
        emailHint.textContent = '✗ Solo se aceptan correos @uniandes.edu.co';
        emailHint.className   = 'field-hint show err';
        emailInput.classList.replace('valid', 'invalid');
      }
    });

    // ── Status & loading ──
    function showStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = `status ${type}`;
    }
    function setLoading(state) {
      const btn = document.getElementById('registerBtn');
      btn.disabled = state;
      btn.innerHTML = state
        ? '<span class="spinner"></span>Creando cuenta…'
        : 'Crear cuenta';
    }

    // ── Register handler ──
    window.handleRegister = async function () {
      const nombre   = document.getElementById('nombre').value.trim();
      const email    = document.getElementById('email').value.trim();
      const carrera  = document.getElementById('carrera').value;
      const semestre = document.getElementById('semestre').value;
      const password = document.getElementById('password').value;

      // Validaciones
      if (!nombre || !email || !carrera || !semestre || !password) {
        showStatus('Por favor completa todos los campos.', 'error');
        return;
      }
      if (!email.endsWith('@uniandes.edu.co')) {
        showStatus('Solo se aceptan correos institucionales @uniandes.edu.co.', 'error');
        emailInput.classList.add('invalid');
        return;
      }
      if (password.length < 8) {
        showStatus('La contraseña debe tener mínimo 8 caracteres.', 'error');
        return;
      }

      setLoading(true);

      try {
        // 1. Crear usuario en Firebase Auth
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const uid  = cred.user.uid;

        // 2. Guardar perfil en Firestore → colección 'usuarios'
        await setDoc(doc(db, 'usuarios', uid), {
          nombre,
          correo:     email,
          carrera,
          semestre:   Number(semestre),
          favoritos:  [],
          amigos:     [],
          disponible: false,
          createdAt:  serverTimestamp(),
        });

        showStatus('¡Cuenta creada! Redirigiendo…', 'success');
        document.getElementById('progressBar').style.width = '100%';
        setTimeout(() => window.location.href = '../pages/home.html', 1000);

      } catch (err) {
        const msgs = {
          'auth/email-already-in-use': 'Este correo ya está registrado. ¿Quieres iniciar sesión?',
          'auth/invalid-email':        'El formato del correo no es válido.',
          'auth/weak-password':        'La contraseña es muy débil. Usa al menos 8 caracteres.',
        };
        showStatus(msgs[err.code] || `Error: ${err.message}`, 'error');
        setLoading(false);
      }
    };
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/syncu/sw.js')
        .catch(err => console.warn('SW:', err));
    }
  </script>
</body>
</html>
